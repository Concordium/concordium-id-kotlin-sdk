# Publishes official Concordium Android SDK releases to Maven Central
# Triggers: manual dispatch or version tag push (v1.0.0, etc.)
name: Publish Android SDK to Maven Central

# Two trigger methods: manual with version input, or automatic on version tags
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
  push:
    # Auto-trigger on version tags (v1.0.0, v2.1.3-beta), 'v' prefix stripped
    tags:
      - 'v*'

env:
  # Disable Gradle daemon for clean CI builds and reproducibility
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  publish:
    runs-on: ubuntu-latest
    # 'release' environment provides security gates and required reviewers
    environment: release
    
    steps:
    # Checkout full history for tag/version extraction
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Setup Java 17 LTS with Gradle caching
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Extract version: from tag (strip 'v') or manual input
    - name: Extract version from tag
      id: extract_version
      run: |
        if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
          # Strip 'v' prefix from tag (v1.0.0 -> 1.0.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        else
          # Use manual input
          VERSION="${{ github.event.inputs.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        fi
        echo "Publishing version: $VERSION"

    # Update SDK version in build.gradle.kts
    - name: Update version in build.gradle.kts
      run: |
        sed -i 's/version = ".*"/version = "${{ steps.extract_version.outputs.VERSION }}"/' concordium-idapp-sdk/build.gradle.kts

    # Make gradlew executable
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Clean, build, and test before publishing
    - name: Build and test
      run: ./gradlew :concordium-idapp-sdk:clean :concordium-idapp-sdk:build :concordium-idapp-sdk:test

    # Publish to Maven Central with GPG signing
    - name: Publish to Maven Central
      env:
        ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
        ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
        ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
      run: |
        ./gradlew :concordium-idapp-sdk:publishReleasePublicationToSonatypeRepository

    # Create GitHub release for tag-triggered builds only
    - name: Create GitHub Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: "Android SDK v${{ steps.extract_version.outputs.VERSION }}"
        # Release notes with Maven dependency and docs
        body: |
          ## 🚀 Android SDK Release v${{ steps.extract_version.outputs.VERSION }}
          
          ### 📦 Maven Dependency
          ```kotlin
          implementation("com.concordium.sdk:concordium-idapp-sdk:${{ steps.extract_version.outputs.VERSION }}")
          ```
          
          ### 📚 Documentation
          - [README](https://github.com/Concordium/concordium-id-kotlin-sdk/blob/main/README.md)
          - [Release Notes](https://github.com/Concordium/concordium-id-kotlin-sdk/blob/main/RELEASE_NOTES.md)
          
          ---
          Published to [Maven Central](https://central.sonatype.com/artifact/com.concordium.sdk/concordium-idapp-sdk/${{ steps.extract_version.outputs.VERSION }})
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Post-publish confirmation and verification link
    - name: Post-publish verification
      run: |
        echo "✅ Successfully published com.concordium.sdk:concordium-idapp-sdk:${{ steps.extract_version.outputs.VERSION }} to Maven Central"
        echo "🔍 Check publication status at: https://central.sonatype.com/artifact/com.concordium.sdk/concordium-idapp-sdk/${{ steps.extract_version.outputs.VERSION }}"